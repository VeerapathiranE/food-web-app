<!DOCTYPE html>
<html>
<head>
<title>User Registration</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    width:380px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.container h2{
    text-align:center;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

label{
    font-size:14px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:14px;
}

input:focus{
    border-color:#667eea;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#667eea;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#5a67d8;
}

</style>
</head>

<body>

<div class="container">

<h2>User Registration</h2>

<form action="register" method="post">

<div class="form-group">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" name="phone" required>
</div>

<div class="form-group">
<label>Address</label>
<input type="text" name="address">
</div>

<button type="submit">Register</button>

<p style="text-align:center; margin-top:15px;">
    Already have an account? <a href="Login.jsp">Login</a>
</p>

</form>

</div>

</body>
</html>
